name: Deploy Dashboard

# Calls the reusable workflow in willie-yao/prow-ai-dashboard to build and
# deploy this repo's CAPZ Prow dashboard to GitHub Pages.

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    uses: willie-yao/prow-ai-dashboard/.github/workflows/reusable-deploy.yml@main
    with:
      project_dir: "."
      builds: 10
      # The smaller model + critique retry loop is slower than the prior
      # Claude setup. A cold full re-analysis spans several runs; the AI cache
      # persists partial progress so each run converges.
      fetch-timeout: "150m"
      ai-model: ${{ vars.AI_MODEL }}
      ai-endpoint: ${{ vars.AI_ENDPOINT }}
    secrets:
      AI_TOKEN: ${{ secrets.AI_TOKEN }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
