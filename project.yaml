# Project config for the CAPZ Prow dashboard.

id: capz
name: "Cluster API Provider Azure"
short_name: "CAPZ"

# Jobs advertising this testgrid dashboard are discovered automatically.
testgrid:
  dashboard: "sig-cluster-lifecycle-cluster-api-provider-azure"

# Job grouping. First substring match wins; unmatched jobs go in "other".
categories:
  - match: "conformance"
    id: "conformance"
    label: "Conformance"
  - match: "[managed kubernetes]"
    id: "aks-e2e"
    label: "AKS E2E"
  - match: "e2e-aks"
    id: "aks-e2e"
    label: "AKS E2E"
  - match: "capi-e2e"
    id: "capi-e2e"
    label: "CAPI E2E"
  - match: "upgrade"
    id: "upgrade"
    label: "Upgrade"
  - match: "coverage"
    id: "coverage"
    label: "Coverage"
  - match: "scalability"
    id: "scalability"
    label: "Scalability"
  - match: "e2e"
    id: "capz-e2e"
    label: "CAPZ E2E"

# Section display order on the landing page.
category_display_order:
  - capz-e2e
  - aks-e2e
  - upgrade
  - capi-e2e
  - conformance
  - coverage
  - scalability

# GCS bucket holding build artifacts.
storage:
  provider: gcs
  bucket: "kubernetes-ci-logs"

# UI branding.
branding:
  title: "CAPZ Prow Dashboard"
  base_path: "/capz-prow-ai-dashboard"
  site_url: "https://willie-yao.github.io/capz-prow-ai-dashboard"
  source_repo:
    owner: "kubernetes-sigs"
    name: "cluster-api-provider-azure"

# AI settings. Endpoint + model come from repo vars set in deploy.yml
# (GitHub Copilot, smaller model). Mirrors the Dynamo dashboard's
# depth-boosting agentic config so a smaller model still digs deep.
ai:
  # Parallel analyses per fetch. Kept at 2 (not Dynamo's 4) because Copilot
  # is a shared endpoint and critique retries multiply request volume.
  concurrency: 2

  # Per-failure wall-clock budget. Generous because the smaller model plus
  # the critique retry loop needs room to finish a deep investigation.
  timeout: 15m

  # Max agentic iterations per failure.
  max_iters: 30
  # Investigation floors: refuse a final answer until the model has made
  # this many tool calls and pulled this many bytes of evidence, so a weaker
  # model can't punt with a shallow answer. Below-floor finals are published
  # but not cached, so the next run retries.
  min_tool_calls: 5
  min_gcs_bytes: 500000
  # On a critique retry, inject the artifacts the draft cited but never read.
  evidence_injection: true
  # Draft + critique retry loop. Also the opt-in for the skill recipes under
  # skills/, which feed this gate.
  critique:
    enabled: true
    max_retries: 2
  # Tools exposed to the agentic loop.
  tools:
    - filesystem
    - k8s
