# Project config for the CAPZ Prow dashboard.
# Consumed by the prow-ai-dashboard engine via .github/workflows/deploy.yml.

id: capz
name: "Cluster API Provider Azure"
short_name: "CAPZ"

# Where in kubernetes/test-infra to find the prow job YAMLs.
source:
  test_infra_paths:
    - "config/jobs/kubernetes-sigs/cluster-api-provider-azure"
  file_prefix: "cluster-api-provider-azure-"

# Only jobs that advertise this testgrid dashboard are included.
testgrid:
  dashboard: "sig-cluster-lifecycle-cluster-api-provider-azure"

# Job grouping. Rules are evaluated in order; first lowercase substring match
# wins. Jobs with no match go in "other".
categories:
  - match: "conformance"
    id: "conformance"
    label: "Conformance"
  - match: "[managed kubernetes]"
    id: "aks-e2e"
    label: "AKS E2E"
  - match: "e2e-aks"
    id: "aks-e2e"
    label: "AKS E2E"
  - match: "capi-e2e"
    id: "capi-e2e"
    label: "CAPI E2E"
  - match: "upgrade"
    id: "upgrade"
    label: "Upgrade"
  - match: "coverage"
    id: "coverage"
    label: "Coverage"
  - match: "scalability"
    id: "scalability"
    label: "Scalability"
  - match: "e2e"
    id: "capz-e2e"
    label: "CAPZ E2E"

# Display order for category sections on the landing page.
category_display_order:
  - capz-e2e
  - aks-e2e
  - upgrade
  - capi-e2e
  - conformance
  - coverage
  - scalability

# GCS bucket holding build artifacts.
gcs:
  bucket: "kubernetes-ci-logs"

# UI branding. Frontend reads these from data/manifest.json at runtime.
branding:
  title: "CAPZ Prow Dashboard"
  base_path: "/capz-prow-ai-dashboard"
  site_url: "https://willie-yao.github.io/capz-prow-ai-dashboard"
  source_repo:
    owner: "kubernetes-sigs"
    name: "cluster-api-provider-azure"

# Cluster name prefix the capi collector uses to group machine artifacts.
capi:
  cluster_name_prefix: "capz-e2e"

# Per-build artifact collector.
artifacts:
  collector: "capi"

# AI analysis settings. Endpoint and model come from repo variables
# (vars.AI_MODEL / vars.AI_ENDPOINT) wired in .github/workflows/deploy.yml.
ai:
  module: "capi"

  # Per-failure evidence collected by the capi module before each AI call.
  # Omit a field to use the engine default; set to [] to disable a default.
  evidence:
    machine_logs:
      - kubelet.log
      - containerd.log
      - journal.log
      - boot.log
      - cloud-init-output.log

    controller_logs:
      - capi-system
      - capi-kubeadm-bootstrap-system
      - capi-kubeadm-control-plane-system
      - capz-system

    build_log_patterns:
      - "FAIL|\\[FAIL\\]"
      - "timed?\\s*out|timeout"
      - "ImagePullBackOff|ErrImagePull"
      - "CrashLoopBackOff"
      - "NotFound|not found"
      - "SkuNotAvailable"
      - "GalleryImage|CommunityGaller"
      - "quota|OperationNotAllowed"
      - "provisioningState.*Failed"
      - "version.*not.*available|not.*replicated"

  # Agentic mode lets the LLM browse GCS itself via function-calling tools.
  # always: false gates per-failure on the capi module's PrefersAgentic
  # heuristic (only failures where curator has little to work with).
  agentic:
    enabled: true
    always: false
